<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Physics in Games Course</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f2f6ff;
      --surface: #ffffff;
      --text: #0b132b;
      --muted: #4b587c;
      --accent: #1d4ed8;
      --accent-hover: #173ea8;
      --border: #d7e2fb;
      --shadow: 0 12px 30px rgba(11, 19, 43, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(155deg, #eaf1ff 0%, #f8faff 50%, #eef4ff 100%);
      color: var(--text);
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 26px;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      line-height: 1.2;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
    }

    a {
      display: inline-block;
      text-decoration: none;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      color: #ffffff;
      background: var(--accent);
      font-weight: 600;
      transition: background-color 0.15s ease, transform 0.15s ease;
    }

    a:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Physics in Games Course</h1>
      <p>Откройте раздел домашних работ по физическим симуляциям.</p>
      <a href="./Homeworks/">Перейти в Homeworks</a>
    </section>
  </main>
</body>
</html>
