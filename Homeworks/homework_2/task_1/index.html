<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>numeric_simulation - p5 simulation</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: start center;
      padding: 12px;
      box-sizing: border-box;
    }

    .controls {
      position: fixed;
      top: 20px;
      left: 20px;
      display: flex;
      gap: 10px;
      z-index: 1000;
    }

    button {
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: #0077b6;
      color: white;
      transition: background-color 0.2s ease;
    }

    button:hover {
      background-color: #005f8f;
    }

    button:active {
      transform: scale(0.98);
    }

    button.reset {
      background-color: #d62828;
    }

    button.reset:hover {
      background-color: #a61f1f;
    }

    select {
      padding: 10px 15px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: #0077b6;
      color: white;
      transition: background-color 0.2s ease;
    }

    select:hover {
      background-color: #005f8f;
    }

    select option {
      background-color: white;
      color: black;
    }

    .param-controls {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 1000;
      background-color: rgba(255, 255, 255, 0.95);
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      min-width: 250px;
    }

    .param-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .param-label {
      font-size: 12px;
      font-weight: 600;
      color: #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .param-value {
      font-size: 13px;
      font-weight: bold;
      color: #0077b6;
      min-width: 40px;
      text-align: right;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      cursor: pointer;
    }

    input[type="number"] {
      padding: 8px;
      font-size: 13px;
      border: 1px solid #0077b6;
      border-radius: 4px;
      width: 100%;
      box-sizing: border-box;
    }

  </style>
</head>
<body>
  <div class="controls">
    <button id="gravityBtn">Гравитация: ВКЛ</button>
    <select id="solverSelect">
      <option value="hitman">Метод: Hitman</option>
      <option value="pbd">Метод: PBD</option>
    </select>
    <button id="resetBtn" class="reset">Сброс</button>
  </div>

  <div class="param-controls">
    <div class="param-group">
      <div class="param-label">
        <span>Итерации:</span>
        <span class="param-value" id="iterationsValue">3</span>
      </div>
      <input type="range" id="iterationsInput" min="1" max="250" step="1" value="3" />
    </div>

    <div class="param-group">
      <div class="param-label">
        <span>Жесткость:</span>
        <span class="param-value" id="stiffnessValue">1.00</span>
      </div>
      <input type="range" id="stiffnessInput" min="0" max="1" step="0.01" value="1.0" />
    </div>

    <div class="param-group">
      <div class="param-label">
        <span>Трение:</span>
        <span class="param-value" id="frictionValue">0.50</span>
      </div>
      <input type="range" id="frictionInput" min="0" max="1" step="0.01" value="0.5" />
    </div>
  </div>

  <main>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
  <script src="./numeric_simulation.js"></script>
</body>
</html>
