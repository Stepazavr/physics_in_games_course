<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>numeric_simulation - p5 simulation</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: start center;
      padding: 12px;
      box-sizing: border-box;
    }

    .controls {
      position: fixed;
      top: 20px;
      left: 20px;
      display: flex;
      gap: 10px;
      z-index: 1000;
    }

    button {
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: #0077b6;
      color: white;
      transition: background-color 0.2s ease;
    }

    button:hover {
      background-color: #005f8f;
    }

    button:active {
      transform: scale(0.98);
    }

    button.reset {
      background-color: #d62828;
    }

    button.reset:hover {
      background-color: #a61f1f;
    }

    select {
      padding: 10px 15px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: #0077b6;
      color: white;
      transition: background-color 0.2s ease;
    }

    select:hover {
      background-color: #005f8f;
    }

    select option {
      background-color: white;
      color: black;
    }

  </style>
</head>
<body>
  <div class="controls">
    <button id="gravityBtn">Гравитация: ВКЛ</button>
    <select id="solverSelect">
      <option value="hitman">Метод: Hitman</option>
      <option value="pbd">Метод: PBD</option>
    </select>
    <button id="resetBtn" class="reset">Сброс</button>
  </div>

  <main>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
  <script src="./numeric_simulation.js"></script>
</body>
</html>
