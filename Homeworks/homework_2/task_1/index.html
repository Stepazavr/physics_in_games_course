<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task 1 - Выбор сцены</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: "Segoe UI", Tahoma, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      max-width: 900px;
      width: 100%;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      color: white;
      margin-bottom: 50px;
      font-size: 2.5em;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    .scenes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      justify-content: center;
    }

    .scene-card {
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      text-align: center;
      cursor: pointer;
    }

    .scene-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.3);
    }

    .scene-card h2 {
      color: #667eea;
      margin: 0 0 15px 0;
      font-size: 1.5em;
    }

    .scene-card p {
      color: #666;
      line-height: 1.6;
      margin: 0 0 20px 0;
    }

    .scene-card a {
      display: inline-block;
      padding: 12px 30px;
      background-color: #667eea;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      transition: background-color 0.3s ease;
      font-weight: 600;
    }

    .scene-card a:hover {
      background-color: #764ba2;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Task 1 - Выбор сцены</h1>
    
    <div class="scenes">
      <div class="scene-card">
        <h2>Сцена 1</h2>
        <p>Система висит на нескольких точках</p>
        <a href="./scene_1/index.html">Запустить</a>
      </div>

      <div class="scene-card">
        <h2>Сцена 2</h2>
        <p>Система падает на пол</p>
        <a href="./scene_2/index.html">Запустить</a>
      </div>

      <div class="scene-card">
        <h2>Сцена 3</h2>
        <p>Система с несовместными ограничениями</p>
        <a href="./scene_3/index.html">Запустить</a>
      </div>

      <div class="scene-card">
        <h2>Сцена 4</h2>
        <p>Два шара</p>
        <a href="./scene_4/index.html">Запустить</a>
      </div>
    </div>
  </div>
</body>
</html>
